<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#1a1a1a"/>
  <!-- Calcite rhombohedron crystal — corner-on view showing three faces -->
  <polygon points="16,4 26,10 16,16 6,10" fill="#c8e8ff"/>
  <polygon points="26,10 26,22 16,28 16,16" fill="#4a9eff"/>
  <polygon points="6,10 16,16 16,28 6,22" fill="#1a5fa8"/>
  <!-- Outer edge highlight -->
  <polygon points="16,4 26,10 26,22 16,28 6,22 6,10"
           fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="0.75" stroke-linejoin="round"/>
</svg>
